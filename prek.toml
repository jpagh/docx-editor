[[repos]]
hooks = [
  # Run the linter.
  { args = ["--fix"], id = "ruff-check", types_or = ["pyi", "python"] },

  # Run the formatter.
  { id = "ruff-format", types_or = ["pyi", "python"] },
]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.20" # Ruff version.

[[repos]]
hooks = [
  { entry = "uv run pytest", id = "pytest", language = "system", name = "pytest", types_or = [
    "pyi",
    "python",
  ] },
]
repo = "local"
